<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeepAsk — Upload</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Nav Bar ────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="20" cy="20" r="20" fill="#16a34a"/>
          <rect x="10" y="8" width="14" height="18" rx="2" fill="white" opacity="0.95"/>
          <polygon points="20,8 26,14 20,14" fill="#16a34a"/>
          <line x1="13" y1="18" x2="21" y2="18" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="13" y1="21" x2="21" y2="21" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="13" y1="24" x2="18" y2="24" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="27" cy="28" r="5" fill="none" stroke="white" stroke-width="2"/>
          <line x1="30.5" y1="31.5" x2="33" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-deep">Deep</span><span class="logo-ask">Ask</span>
      </a>
      <button class="nav-hamburger" id="navHamburger" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navLinks">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="/" class="nav-link active" aria-current="page">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload
        </a>
        <a href="/mindmap" class="nav-link" id="navMindMap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg>
          Mind Map
        </a>
        <a href="/chat" class="nav-link" id="navChat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Chat
        </a>
      </div>
    </div>
  </nav>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main class="page-upload">
    <div class="container">

      <!-- Hero -->
      <header class="page-header">
        <h1><span style="color:#16a34a; font-weight:800">Deep</span><span style="color:#111827; font-weight:800">Ask</span></h1>
        <p class="page-subtitle">Your document intelligence hub. Upload PDFs, Word docs, or text files — then explore them through a mind map or chat with them directly.</p>
      </header>

      <!-- Upload Card -->
      <section class="card upload-card" aria-label="Upload documents">
        <h2 class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Documents
        </h2>

        <!-- Drop Zone -->
        <div
          class="drop-zone"
          id="dropZone"
          role="button"
          tabindex="0"
          aria-label="Upload area — drag and drop or click to browse"
        >
          <input type="file" id="fileInput" accept=".pdf,.docx,.txt" class="file-input-hidden" aria-label="File input" />
          <div class="drop-zone-content" id="dropZoneContent">
            <div class="drop-icon" aria-hidden="true">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <p class="drop-primary">Drag &amp; drop your file here</p>
            <p class="drop-secondary">or <span class="drop-browse">click to browse</span></p>
            <p class="drop-formats">PDF · DOCX · TXT</p>
          </div>
        </div>

        <!-- Upload feedback -->
        <div id="uploadFeedback" class="upload-feedback" aria-live="polite"></div>
      </section>

      <!-- Documents List Card -->
      <section class="card docs-card" aria-label="Uploaded documents">
        <div class="docs-card-header">
          <h2 class="card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Your Documents
          </h2>
          <span class="docs-count" id="docsCount" aria-live="polite"></span>
        </div>
        <div id="docsList" class="docs-list" aria-live="polite">
          <!-- populated by JS -->
        </div>
      </section>

    </div><!-- /container -->
  </main>

  <!-- ── Sticky CTA ─────────────────────────────────────────── -->
  <div class="sticky-cta" id="stickyCta" aria-hidden="true">
    <a href="/mindmap" class="btn btn-cta">
      View Mind Map
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
